<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet">
    <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--colorNeutralBackground1, #fff);
      color: var(--colorNeutralForeground1, #242424);
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header bar */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--colorBrandBackground, #0078d4);
      color: white;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .header .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .badge {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 400;
    }
    .btn-open {
      display: none;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-open:hover { background: rgba(255,255,255,0.4); }
    .btn-open svg { width: 14px; height: 14px; fill: currentColor; }
    .btn-back {
      display: none;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.4); }
    .btn-back svg { width: 14px; height: 14px; fill: currentColor; }

    .btn-toggle {
      display: none;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-toggle:hover { background: rgba(255,255,255,0.4); }
    .btn-toggle svg { width: 14px; height: 14px; fill: currentColor; }
    .btn-toggle.active {
      background: rgba(255,255,255,0.5);
    }

    /* Loading state */
    .loading-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--colorNeutralForeground3, #707070);
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--colorNeutralStroke1, #e0e0e0);
      border-top-color: var(--colorBrandForeground1, #0078d4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Preview iframe container */
    .preview-container {
      flex: 1;
      display: none;
      position: relative;
    }
    .preview-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* Code view */
    .code-container {
      flex: 1;
      display: none;
      position: relative;
      overflow: auto;
      background: #1e1e1e;
    }
    .code-container pre[class*="language-"] {
      margin: 0;
      padding: 16px;
      padding-left: 3.5em;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      background: #1e1e1e;
      border-radius: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .code-container code[class*="language-"] {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .btn-copy {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #3c3c3c;
      border: 1px solid #555;
      color: #ccc;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      z-index: 2;
      transition: background 0.15s;
    }
    .btn-copy:hover { background: #505050; color: white; }

    /* Info bar */
    .info-bar {
      padding: 8px 16px;
      background: var(--colorNeutralBackground3, #f5f5f5);
      border-top: 1px solid var(--colorNeutralStroke2, #e0e0e0);
      font-size: 12px;
      color: var(--colorNeutralForeground3, #707070);
      flex-shrink: 0;
      display: none;
    }

    /* Error state */
    .error-container {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 12px;
      color: var(--colorPaletteRedForeground1, #c50f1f);
    }
  </style>
</head>
<body>
  <div class="header">
    <span>UI Generator Preview</span>
    <div class="header-actions">
      <button class="btn-toggle" id="btn-toggle" title="Basculer entre apercu et code">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M5.854 4.146a.5.5 0 10-.708.708l3 3a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L9 6.293V1.5a.5.5 0 00-1 0v4.793L5.854 4.146zM2.5 7a.5.5 0 01.354.146L6 10.293l3.146-3.147a.5.5 0 01.708.708l-3.5 3.5a.5.5 0 01-.708 0l-3.5-3.5A.5.5 0 012.5 7z" fill="none"/><path d="M7.5 2a.5.5 0 00-.5.5v1a.5.5 0 001 0v-1a.5.5 0 00-.5-.5z" fill="none"/><path d="M12.146 5.146a.5.5 0 01.708 0l2.5 2.5a.5.5 0 010 .708l-2.5 2.5a.5.5 0 01-.708-.708L14.293 8l-2.147-2.146a.5.5 0 010-.708zM7.854 5.146a.5.5 0 00-.708 0l-2.5 2.5a.5.5 0 000 .708l2.5 2.5a.5.5 0 00.708-.708L5.707 8l2.147-2.146a.5.5 0 000-.708zM10.608 4.21a.5.5 0 01.18.684l-3 5a.5.5 0 11-.865-.504l3-5a.5.5 0 01.685-.18z"/></svg>
        Code
      </button>
      <button class="btn-open" id="btn-open" title="Ouvrir en grand">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M11 3a1 1 0 100 2h2.586l-4.293 4.293a1 1 0 001.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5zM5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
        Ouvrir en grand
      </button>
      <button class="btn-back" id="btn-back" title="Retour au chat">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 3.293L3.293 10 10 16.707l1.414-1.414L7.12 11H17V9H7.12l4.294-4.293L10 3.293z"/></svg>
        Retour
      </button>
      <span class="badge" id="status-badge">En attente...</span>
    </div>
  </div>

  <div class="loading-container" id="loading">
    <div class="loading-spinner"></div>
    <div>En attente de la generation...</div>
  </div>

  <div class="preview-container" id="preview">
    <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title="UI Preview"></iframe>
  </div>

  <div class="code-container" id="code-view">
    <button class="btn-copy" id="btn-copy">Copier</button>
    <pre class="line-numbers language-html"><code class="language-html" id="code-content"></code></pre>
  </div>

  <div class="info-bar" id="info-bar"></div>

  <div class="error-container" id="error">
    <div style="font-size: 24px;">&#9888;</div>
    <div id="error-message">Erreur</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script type="module">
    import { App } from 'https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps/+esm';
    import { webLightTheme, webDarkTheme } from 'https://cdn.jsdelivr.net/npm/@fluentui/tokens/+esm';

    const loadingEl = document.getElementById('loading');
    const previewEl = document.getElementById('preview');
    const previewFrame = document.getElementById('preview-frame');
    const codeView = document.getElementById('code-view');
    const codeContent = document.getElementById('code-content');
    const infoBar = document.getElementById('info-bar');
    const errorEl = document.getElementById('error');
    const errorMsg = document.getElementById('error-message');
    const statusBadge = document.getElementById('status-badge');
    const btnOpen = document.getElementById('btn-open');
    const btnToggle = document.getElementById('btn-toggle');
    const btnCopy = document.getElementById('btn-copy');

    let currentHtmlCode = '';
    let isFullscreen = false;
    let showingCode = false;

    // Toggle code/preview
    btnToggle.addEventListener('click', () => {
      showingCode = !showingCode;
      if (showingCode) {
        previewEl.style.display = 'none';
        codeView.style.display = 'block';
        codeContent.textContent = currentHtmlCode;
        Prism.highlightElement(codeContent);
        btnToggle.classList.add('active');
        btnToggle.querySelector('span')?.remove();
        btnToggle.insertAdjacentHTML('beforeend', '<span>Apercu</span>');
      } else {
        previewEl.style.display = 'block';
        codeView.style.display = 'none';
        btnToggle.classList.remove('active');
        btnToggle.querySelector('span')?.remove();
        btnToggle.insertAdjacentHTML('beforeend', '<span>Code</span>');
      }
    });

    // Copy code
    btnCopy.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(currentHtmlCode);
        btnCopy.textContent = 'Copie !';
        setTimeout(() => { btnCopy.textContent = 'Copier'; }, 1500);
      } catch (_) {
        btnCopy.textContent = 'Erreur';
        setTimeout(() => { btnCopy.textContent = 'Copier'; }, 1500);
      }
    });

    // Open in fullscreen panel
    btnOpen.addEventListener('click', async () => {
      if (!currentHtmlCode) return;
      try { await app.requestDisplayMode({ mode: 'fullscreen' }); } catch (_) {}
      isFullscreen = true;
      btnOpen.style.display = 'none';
      btnBack.style.display = 'flex';
    });

    // Back to inline
    const btnBack = document.getElementById('btn-back');
    btnBack.addEventListener('click', async () => {
      try { await app.requestDisplayMode({ mode: 'inline' }); } catch (_) {}
      isFullscreen = false;
      btnOpen.style.display = 'flex';
      btnBack.style.display = 'none';
    });

    function applyTheme(theme) {
      const tokens = theme === 'dark' ? webDarkTheme : webLightTheme;
      const root = document.documentElement;
      for (const [token, value] of Object.entries(tokens)) {
        root.style.setProperty('--' + token, value);
      }
      document.body.style.background = theme === 'dark'
        ? 'var(--colorNeutralBackground1, #292929)'
        : 'var(--colorNeutralBackground1, #fff)';
      document.body.style.color = theme === 'dark'
        ? 'var(--colorNeutralForeground1, #e0e0e0)'
        : 'var(--colorNeutralForeground1, #242424)';
    }

    function showLoading() {
      loadingEl.style.display = 'flex';
      previewEl.style.display = 'none';
      codeView.style.display = 'none';
      errorEl.style.display = 'none';
      infoBar.style.display = 'none';
      btnToggle.style.display = 'none';
      statusBadge.textContent = 'En attente...';
    }

    function showPreview(htmlCode, description, type) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'none';
      infoBar.style.display = 'block';
      btnToggle.style.display = 'flex';

      currentHtmlCode = htmlCode;

      // Show correct view
      if (showingCode) {
        previewEl.style.display = 'none';
        codeView.style.display = 'block';
        codeContent.textContent = htmlCode;
        Prism.highlightElement(codeContent);
      } else {
        previewEl.style.display = 'block';
        codeView.style.display = 'none';
      }

      // Write the generated HTML into the iframe
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      doc.open();
      doc.write(htmlCode);
      doc.close();

      const label = type === 'update' ? 'Mis a jour' : 'Genere';
      statusBadge.textContent = label;
      infoBar.textContent = description;

      // Auto-open fullscreen on first generation
      if (!isFullscreen) {
        isFullscreen = true;
        btnOpen.style.display = 'none';
        btnBack.style.display = 'flex';
        try { app.requestDisplayMode({ mode: 'fullscreen' }); } catch (_) {}
      }
    }

    function showError(message) {
      loadingEl.style.display = 'none';
      previewEl.style.display = 'none';
      codeView.style.display = 'none';
      errorEl.style.display = 'flex';
      infoBar.style.display = 'none';
      btnToggle.style.display = 'none';
      errorMsg.textContent = message;
      statusBadge.textContent = 'Erreur';
    }

    // Show loading initially
    showLoading();

    // MCP Apps setup
    const app = new App({ name: 'ui-preview', version: '1.0.0' });

    app.ontoolresult = (result) => {
      const data = result.structuredContent;
      if (data && data.htmlCode) {
        showPreview(data.htmlCode, data.description || '', data.type || 'generate');
      } else {
        showError('Aucun code HTML recu.');
      }
    };

    app.onhostcontextchanged = (ctx) => {
      if (ctx.theme) { applyTheme(ctx.theme); }
    };

    app.onteardown = () => ({});

    await app.connect();

    const hostCtx = app.getHostContext();
    if (hostCtx?.theme) { applyTheme(hostCtx.theme); }
  </script>
</body>
</html>
